# Cloudflare Workers configuration for CreatorConnect
# First-time setup:
#   1. wrangler login
#   2. wrangler d1 create creatorconnect          (note the database_id)
#   3. wrangler d1 execute creatorconnect --file=./cloudflare/schema.sql
#   4. Set secrets (see below)
#   5. npm run deploy
#
# Secrets — run for each:
#   wrangler secret put CF_ACCOUNT_ID
#   wrangler secret put CF_D1_DATABASE_ID
#   wrangler secret put CF_API_TOKEN
#   wrangler secret put JWT_SECRET          (openssl rand -hex 32)
#   wrangler secret put ZOOM_ACCOUNT_ID     (optional)
#   wrangler secret put ZOOM_CLIENT_ID      (optional)
#   wrangler secret put ZOOM_CLIENT_SECRET  (optional)
#   wrangler secret put ZOOM_SDK_KEY        (optional)
#   wrangler secret put ZOOM_SDK_SECRET     (optional)

name = "your-daily-progress"
main = "dist/server/server.js"
compatibility_date = "2025-06-13"
compatibility_flags = ["nodejs_compat"]

# D1 database binding — app accesses this via env.DB at runtime
[[d1_databases]]
binding = "DB"
database_name = "creatorconnect"
database_id = "0bdf02e5-7bca-4130-a5ad-bb7e6f4e93e9"

# Serve Vite client bundle as static assets
[assets]
directory = "dist/client"
binding = "ASSETS"
